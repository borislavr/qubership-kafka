{{- if and (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1") (eq .Values.PAAS_PLATFORM "KUBERNETES") -}}
{{- if and .Values.cruiseControl.install (eq (include "cruise-control.ingressEnabled" .) "true") .Values.cruiseControl.ui.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cruise-control-httproute
  labels:
    {{- include "kafka-services.defaultLabels" . | nindent 4 }}
  annotations:
    route.openshift.io/termination: edge
spec:
  parentRefs:
    - name: {{ .Values.cruiseControl.ingress.gatewayName | default "default-external-gateway" }}
      namespace: {{ .Values.cruiseControl.ingress.envoyNamespace | default "envoy-gateway" }}
      port: 443
  hostnames:
    - {{ include "cruise-control.ingressHost" . | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ template "kafka.name" . }}-cruise-control
          port: 9090
{{- end }}
{{- end }}