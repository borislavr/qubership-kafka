{{- if and .Values.akhq.envoyGateway.enabled .Values.akhq.install }}
{{- if and (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1") (eq .Values.PAAS_PLATFORM "KUBERNETES") }}

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: akhq-httproute
  labels:
    {{- include "kafka-services.defaultLabels" . | nindent 4 }}
  annotations:
    route.openshift.io/termination: edge
spec:
  parentRefs:
  {{- include "gateway.parentRefs" (list . .Values.akhq.envoyGateway.parentRefs) | nindent 2 }}

  hostnames:
  {{- if .Values.akhq.envoyGateway.host }}
    - {{ .Values.akhq.envoyGateway.host | quote }}
  {{- else }}
    - {{ include "akhq.ingressHost" . | quote }}
  {{- end }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: akhq
          port: 8080

{{- end }}
{{- end }}